name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  # Typechecks, runs unit tests, and builds the production bundle
  lint-test-build:
    name: Typecheck, Unit Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn vitest run

      - name: Build
        run: yarn build

  # Runs CodeceptJS + Playwright E2E tests against a production build.
  # Skip with [skip-e2e] in the commit message, or trigger manually via Actions tab.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && !contains(github.event.commits[0].message, '[skip-e2e]'))
      || (github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[skip-e2e]'))
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      # Cache Playwright browsers (keyed by playwright version in yarn.lock)
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}

      # Install browser binary (skipped on cache hit) + OS-level libs (always needed)
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright OS deps
        run: npx playwright install-deps chromium

      - name: Build
        run: yarn build

      # Start the Vite preview server in the background, wait for it to be
      # ready, then run the headless E2E suite against it
      - name: Run E2E tests
        run: |
          npx vite preview --port 5173 &
          npx wait-on http://localhost:5173 --timeout 30000
          yarn test:e2e

      # On failure, upload screenshots/logs so we can debug without re-running
      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-output
          path: tests/e2e/output/
